<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNE TABLE | 華やかな装いを あなただけの空間へ</title>
    <!-- ReactとBabel（Reactをブラウザで動かすためのライブラリ） -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CONFIG = {
            brandName: "UNE TABLE",
            tagline: "華やかな装いを あなただけの空間へ",
        };

        const services = [
            { key: "cocktail", title: "Cocktail Party", sub: "カクテルパーティー", desc: "カジュアルな会合を盛り上げる、彩り豊かな演出。フィンガーフードで会話も弾む特別な空間。" },
            { key: "standing", title: "Standing Reception", sub: "スタンディングレセプション", desc: "大切なビジネスシーンに適した洗練されたスタイル。ブランドイメージを高める立食スタイルを提供。" },
            { key: "private", title: "Private Dining", sub: "プライベートダイニング", desc: "オーダーメイドのレストラン。すべてにこだわった特別な空間で、プライベートな贅沢を。" },
        ];

        function Pattern3() {
            const [scrolled, setScrolled] = useState(false);
            const [hoveredService, setHoveredService] = useState(null);
            const [cursorPos, setCursorPos] = useState({ x: -100, y: -100 });

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 60);
                window.addEventListener("scroll", onScroll);
                return () => window.removeEventListener("scroll", onScroll);
            }, []);

            useEffect(() => {
                const move = e => setCursorPos({ x: e.clientX, y: e.clientY });
                window.addEventListener("mousemove", move);
                return () => window.removeEventListener("mousemove", move);
            }, []);

            return (
                <div style={{ fontFamily: "'EB Garamond', 'Noto Serif JP', Georgia, serif", background: "#f8f5f0", color: "#1a1510", minHeight: "100vh", overflowX: "hidden", cursor: "none" }}>
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+JP:wght@200;300&family=Bebas+Neue&family=Raleway:wght@100;200;300;400&display=swap');
                        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
                        html { scroll-behavior: smooth; }
                        .hero-inner { animation: heroEnter 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                        @keyframes heroEnter { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
                        @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
                        .nav-link3 { font-family: 'Raleway', sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: #6a5a4a; transition: color 0.3s; font-weight: 300; }
                        .nav-link3:hover { color: #1a1510; }
                        .service-row { display: flex; align-items: center; padding: 32px 0; border-bottom: 1px solid #e0d8cc; transition: all 0.4s; gap: 40px; }
                        .svc-title { font-family: 'EB Garamond', serif; font-size: clamp(22px, 3vw, 34px); font-weight: 400; font-style: italic; letter-spacing: 0.12em; color: #1a1510; }
                        .deco-circle { position: absolute; border: 1px solid #c4b8a8; border-radius: 50%; }
                        .rotating { animation: rotateSlow 20s linear infinite; }
                        .form-input { background: #f0ebe3; border: none; border-bottom: 2px solid #e0d8cc; padding: 12px 0; width: 100%; outline: none; }
                        .gallery-row { display: flex; gap: 8px; height: 280px; }
                        .gallery-row > div { flex: 1; transition: flex 0.6s ease; }
                        .gallery-row > div:hover { flex: 2.5; }
                    `}</style>

                    <div style={{
                        position: "fixed", zIndex: 9999, pointerEvents: "none",
                        left: cursorPos.x - 12, top: cursorPos.y - 12,
                        width: 24, height: 24, borderRadius: "50%",
                        border: "1px solid #1a1510", transition: "left 0.08s, top 0.08s", mixBlendMode: "multiply",
                    }} />

                    <nav style={{
                        position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
                        padding: scrolled ? "14px 8vw" : "28px 8vw", transition: "all 0.6s",
                        background: scrolled ? "rgba(248,245,240,0.96)" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "space-between",
                    }}>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: "0.5em" }}>{CONFIG.brandName}</div>
                        <div style={{ display: "flex", gap: 40 }}>
                            {["Concept", "Services", "Gallery", "Menu"].map(item => <a key={item} href="#" className="nav-link3">{item}</a>)}
                        </div>
                    </nav>

                    <section style={{ minHeight: "100vh", display: "flex", alignItems: "center", padding: "100px 8vw", position: "relative", overflow: "hidden" }}>
                        <div className="hero-inner" style={{ position: "relative", zIndex: 2 }}>
                            <h1 style={{ fontFamily: "'EB Garamond', serif", fontSize: "clamp(64px, 10vw, 130px)", fontWeight: 300, lineHeight: 0.95 }}>
                                <span style={{ display: "block", fontStyle: "italic" }}>Une</span>
                                <span style={{ display: "block" }}>Table</span>
                            </h1>
                            <p style={{ marginTop: 24, letterSpacing: "0.2em", color: "#6a5a4a" }}>{CONFIG.tagline}</p>
                            <a href="#contact" style={{ display: "inline-block", marginTop: 40, padding: "15px 50px", background: "#1a1510", color: "#fff", textDecoration: "none", fontSize: 10, letterSpacing: "0.3em" }}>Reservation</a>
                        </div>
                    </section>

                    <section id="services" style={{ padding: "120px 8vw" }}>
                        <h2 style={{ fontFamily: "'EB Garamond', serif", fontSize: 42, fontStyle: "italic", marginBottom: 60 }}>Services</h2>
                        {services.map((s, i) => (
                            <div key={s.key} className="service-row">
                                <div style={{ minWidth: 40, fontFamily: "'Bebas Neue'" }}>0{i+1}</div>
                                <div style={{ flex: 1 }}><div className="svc-title">{s.title}</div></div>
                                <p style={{ maxWidth: 400, fontSize: 13 }}>{s.desc}</p>
                            </div>
                        ))}
                    </section>

                    <section id="contact" style={{ padding: "120px 8vw", background: "#f0ebe3" }}>
                        <h2 style={{ fontFamily: "'EB Garamond', serif", fontSize: 42, fontStyle: "italic", marginBottom: 40 }}>Contact</h2>
                        <div style={{ maxWidth: 600 }}>
                            <input className="form-input" placeholder="Name" />
                            <input className="form-input" style={{ marginTop: 20 }} placeholder="Email" />
                            <textarea className="form-input" style={{ marginTop: 20, height: 100 }} placeholder="Message" />
                            <button style={{ marginTop: 30, padding: "15px 60px", background: "#1a1510", color: "#fff", border: "none" }}>Send</button>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Pattern3 />);
    </script>
</body>
</html>
