<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オーダーメイド・ケータリング | 企業の懇親会・祝賀会</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; color: #333; background-color: #fdfdfd; }
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; color: #fff; text-align: center;
        }
        .hero-content h1 { font-size: 4rem; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 20px; }
        .hero-content p { font-size: 1.8rem; margin-bottom: 40px; }
        .btn {
            background: linear-gradient(45deg, #d4af37, #f9f295, #d4af37);
            color: #333; padding: 20px 50px; text-decoration: none; font-weight: bold;
            border-radius: 50px; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .section { padding: 100px 20px; text-align: center; max-width: 1200px; margin: 0 auto; }
        h2 { font-size: 2.5rem; color: #b8860b; margin-bottom: 50px; position: relative; }
        h2::after { content: ""; display: block; width: 60px; height: 3px; background: #b8860b; margin: 20px auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card h3 { padding: 20px; color: #333; }
        .card p { padding: 0 20px 30px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>オーダーメイドのケータリング</h1>
            <p>特別な懇親会を、最高級の華やかさで。</p>
            <a href="#" class="btn">お問い合わせはこちら</a>
        </div>
    </section>
    <section class="section">
        <h2>Service Menu</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1530101978247-2c78493045ec?auto=format&fit=crop&w=600&q=80">
                <h3>周年記念パーティー</h3>
                <p>企業のブランド価値を高める、格調高い空間演出と料理。</p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=600&q=80">
                <h3>季節のフィンガーフード</h3>
                <p>厳選された旬の食材を、宝石のような一皿に仕上げます。</p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=600&q=80">
                <h3>オーダーコーディネート</h3>
                <p>コンセプトに合わせ、会場設営から全てフルオーダー可能。</p>
            </div>
        </div>
    </section>
</body>
</html>
